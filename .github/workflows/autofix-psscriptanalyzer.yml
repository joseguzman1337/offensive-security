# Auto-fix loop for PSScriptAnalyzer alerts.
#
# PSScriptAnalyzer has a partial autofix via `Invoke-Formatter` for
# style-class rules (PSAvoidGlobalAliases, PSUseConsistentIndentation,
# etc.). The autofix runner walks every .ps1 in the repo and
# formats it; logic-class findings (PSAvoidUsingPlainTextForPassword,
# PSUsePSCredentialType, etc.) get tracked in a GitHub issue rather
# than auto-fixed.
name: Autofix PSScriptAnalyzer

on:
  push:
    branches: [master]
  schedule:
    - cron: "35 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  security-events: read
  issues: write

jobs:
  autofix:
    name: autofix(psscriptanalyzer)
    runs-on: [self-hosted, hermes-local]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PowerShell + PSScriptAnalyzer
        run: |
          brew update
          brew install --cask powershell
          pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck -AcceptLicense"

      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,powershell"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py psscriptanalyzer
