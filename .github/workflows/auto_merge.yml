name: Auto Update and Merge

# Security fix (closes code-scanning alerts #10, #11, #12 on
# joseguzman1337/offensive-security):
#   - actions/missing-workflow-permissions  → explicit `permissions:` block
#   - actions/untrusted-checkout            → drop `ref: ${{ github.event.pull_request.head.ref }}`
#                                              and stop checking out attacker-controlled code
#   - actions/code-injection                → never interpolate pull_request.* into `run:`;
#                                              the GitHub API merges the PR without ever
#                                              materializing the PR head in the runner

on:
  schedule:
    - cron: '*/45 * * * *' # Run every 45 minutes
  pull_request_target:
    types: [auto_merge_enabled]
    branches:
      - master

# Default to the smallest permission set; jobs that need write opt in.
permissions: read-only

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # This job needs to push (merge) the PR, so it explicitly requests
    # contents: write. It does NOT need any other scope.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR via GitHub API (no checkout of PR head)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=squash
