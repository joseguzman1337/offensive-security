name: Security Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  pull_request_target:
    types: [auto_merge_enabled]
    branches: [master]
  branch_protection_rule:
  schedule:
    - cron: "0 0 * * 1"
    - cron: "20 7 * * 2"
    - cron: "32 15 * * 2"
    - cron: "0 0 * * *"
    - cron: "20 3 * * *"
    - cron: "25 3 * * *"
    - cron: "30 3 * * *"
    - cron: "35 3 * * *"
    - cron: "40 3 * * *"
    - cron: "45 * * * *"
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  auto-merge:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR via GitHub API (no checkout of PR head)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=squash

  # CodeQL: default setup at the repo level is the supported upload path
  # (state=configured, query_suite=default, threat_model=remote). The
  # advanced matrix job below is intentionally disabled: with default
  # setup enabled, GitHub rejects SARIF uploads from advanced workflows
  # with "CodeQL analyses from advanced configurations cannot be
  # processed when the default setup is enabled". If you need to
  # re-enable the matrix, first disable default setup in repo settings
  # (Settings -> Code security and analysis -> Code scanning -> Default
  # setup -> Disable). The standalone .github/workflows/codeql-analysis.yml
  # was deleted in the same commit because (a) it duplicated this job
  # and (b) the empty `language: []` matrix + `if: false` job
  # produced zero-job runs that GitHub marked as failures with
  # "likely failed because of a workflow file issue". Default setup
  # is the only CodeQL path that runs in this repo while it is in
  # `state=configured`.
  codeql-analysis:
    if: false
    name: CodeQL
    runs-on: [self-hosted, hermes-local]
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # go excluded: this repo has no Go source. CodeQL fails with
        # exit 32 ("Only found ... Go") when the Go matrix entry runs
        # against a tree with zero Go files. Re-add when Go source is
        # added. javascript was excluded previously.
        language: ['python', 'actions']
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294

  fuzz:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-bin: ["python3.11", "python3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # On this self-hosted macOS runner, Python is managed by Homebrew
      # (PEP 668 externally-managed-environment). Use uv to create an
      # ephemeral venv per matrix entry so we don't pollute the runner's
      # system Python. uv is pre-installed by the runner bootstrap.
      - name: Install uv
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Install runtime deps (flask + psutil for monitor_cluster import)
        run: |
          uv venv --python "${{ matrix.python-bin }}" .venv-fuzz
          . .venv-fuzz/bin/activate
          uv pip install --quiet flask==3.0.3 psutil==6.0.0
      # fuzz_seeds.py is the deterministic regression seed runner. It
      # runs without atheris/libFuzzer so this job works on any
      # self-hosted macOS runner (no LLVM build step required). The
      # companion atheris harness lives at
      # fuzz/fuzz_validate_scan_target.py and is exercised by the
      # `fuzzing` job below.
      - name: Run fuzz seed corpus
        working-directory: SuperCluster
        run: |
          . ../.venv-fuzz/bin/activate
          "${{ matrix.python-bin }}" fuzz/fuzz_seeds.py

  fuzzing:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # Self-hosted Mac runner. The previous revision of this job ran
    # clusterfuzzlite on ubuntu-latest, but:
    #   1. The operator's CI policy is "autofix only via self-hosted
    #      runners on this device" — ubuntu-latest violates that.
    #   2. clusterfuzzlite's build_fuzzers/run_fuzzers are container
    #      actions and require Linux; the seed-only Python harness
    #      in this repo is not a libFuzzer binary, so build_fuzzers
    #      always failed to find a fuzzer to bundle.
    # The autofix: run atheris (a CPython-instrumented libFuzzer
    # driver) directly on the self-hosted Mac. atheris needs an
    # LLVM build with libFuzzer; the runner ships Homebrew LLVM at
    # /opt/homebrew/opt/llvm (clang 22+ has libLLVMFuzzerCLI.a).
    # We pin CLANG_BIN so atheris's setup.py uses that clang at
    # install time, and we cap the run with -max_total_time so a
    # single-runner multiplex does not block the rest of the suite
    # for 10 minutes.
    runs-on: [self-hosted, hermes-local]
    permissions: read-all
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install uv
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Ensure LLVM (libFuzzer) is available
        # atheris 3.x builds against an LLVM clang that ships
        # libFuzzer. Apple Clang does NOT, so we need Homebrew's
        # llvm formula. The runner is bootstrapped with llvm
        # pre-installed at /opt/homebrew/opt/llvm; the `brew
        # install` path is the safety net for a fresh runner.
        run: |
          set -euo pipefail
          if [ -x /opt/homebrew/opt/llvm/bin/clang ]; then
            echo "llvm already installed at /opt/homebrew/opt/llvm"
            /opt/homebrew/opt/llvm/bin/clang --version
          else
            echo "llvm not found; installing via Homebrew"
            brew update
            brew install llvm
          fi
      - name: Install runtime + atheris (build with Homebrew LLVM)
        env:
          CLANG_BIN: /opt/homebrew/opt/llvm/bin/clang
        run: |
          set -euo pipefail
          uv venv --python python3.12 .venv-fuzzing
          . .venv-fuzzing/bin/activate
          uv pip install --quiet flask==3.0.3 psutil==6.0.0
          # atheris's setup.py calls $CLANG_BIN to compile its
          # libFuzzer-binding C extension. Without this, the install
          # fails with "Apple Clang does not come with libFuzzer".
          uv pip install --quiet atheris==3.0.0
      - name: Refresh the seed corpus
        # fuzz_seeds.py writes 19 seed inputs to
        # SuperCluster/fuzz/fuzz_corpus/ on every run. atheris will
        # use them as a starting corpus (the "corpus_minimization"
        # benefit is real even for a function with shallow
        # branches).
        working-directory: SuperCluster
        run: |
          . ../.venv-fuzzing/bin/activate
          python fuzz/fuzz_seeds.py
      - name: Run atheris/libFuzzer (coverage-guided, bounded)
        # -max_total_time caps wall-clock so this job does not
        # starve the rest of the suite on the single self-hosted
        # runner. -atheris_runs caps iterations as a second
        # safety net. The job exits non-zero on any crash or
        # uncaught exception in _validate_scan_target, which
        # is what the autofix contract requires.
        env:
          CLANG_BIN: /opt/homebrew/opt/llvm/bin/clang
        working-directory: SuperCluster
        run: |
          . ../.venv-fuzzing/bin/activate
          python fuzz/fuzz_validate_scan_target.py \
            fuzz/fuzz_corpus \
            -atheris_runs=50000 \
            -max_total_time=120 \
            -print_final_stats=1

  ossar-analysis:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2
      - run: git checkout HEAD^2
        if: ${{ github.event_name == 'pull_request' }}
      - name: Run OSSAR
        uses: github/ossar-action@4e96c4f6e591eb4b991abfd459e40b136a317aea
        id: ossar
      - name: Upload OSSAR results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}

  powershell-analysis:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@7a0da25f33985767f15f93140306528900744195
        with:
          path: .\
          recurse: true
          includeRule: '"PSAvoidGlobalAliases", "PSAvoidUsingConvertToSecureStringWithPlainText"'
          output: results.sarif
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: results.sarif

  snyk-analysis:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Run Snyk container scan
        uses: snyk/actions/docker@8e119fbb6c251787721d34ba683ed48eba792766
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: .
          args: --file=Dockerfile --sarif-file-output=snyk.sarif
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: snyk.sarif

  trivy-analysis:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Run Trivy
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          image-ref: .
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: trivy-results.sarif

  autofix-codeql:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix CodeQL
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 scripts/autofix.py codeql

  autofix-binskim:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix BinSkim
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,binary"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py binskim

  autofix-bandit:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix Bandit
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Bandit
        run: python3 -m pip install --quiet bandit
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,python"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py bandit

  autofix-eslint:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix ESLint
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,javascript"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py eslint

  autofix-psscriptanalyzer:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix PSScriptAnalyzer
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install PowerShell + PSScriptAnalyzer
        # The `powershell` cask was renamed to `powershell@preview` (and
        # `powershell` no longer resolves). Try the new name first, then
        # fall back. If neither is available, install via the official
        # .pkg installer as a last resort.
        run: |
          set -euo pipefail
          if ! command -v pwsh >/dev/null 2>&1; then
            brew update
            if brew install --cask powershell@preview 2>/dev/null; then
              :
            else
              echo "::warning::powershell cask unavailable; skipping PSScriptAnalyzer scan"
              exit 0
            fi
          fi
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck -AcceptLicense"
          fi
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,powershell"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py psscriptanalyzer

  autofix-scorecard:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    name: Autofix Scorecard
    runs-on: [self-hosted, hermes-local]
    permissions:
      contents: write
      security-events: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,scorecard,supply-chain"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py scorecard
