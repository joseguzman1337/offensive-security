# Auto-fix loop for OpenSSF Scorecard alerts.
#
# Scorecard evaluates supply-chain security (branch protection,
# pinned dependencies, signed releases, etc.). Most findings need
# repo-admin action, but a few can be auto-fixed:
#
#   - missing SECURITY.md  → created from a known-good template
#   - missing CODEOWNERS    → created with the operator
#   - missing dependabot.yml → created with a weekly schedule
#   - unpinned actions in workflows → would require deeper refactor
#     and is tracked in the issue, not auto-fixed
#
# For everything else, the autofix runner files (or appends to) a
# tracking issue so each Scorecard check that fails is named and
# tracked, not silently dismissed.
name: Autofix Scorecard

on:
  push:
    branches: [master]
  schedule:
    # Scorecard itself runs weekly (see scorecards.yml). Autofix
    # runs daily so trust fixes land before the next scan.
    - cron: "40 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  security-events: read
  issues: write

jobs:
  autofix:
    name: autofix(scorecard)
    runs-on: [self-hosted, hermes-local]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run autofix runner
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_SHA: ${{ github.sha }}
          ISSUE_LABELS: "security,scorecard,supply-chain"
        run: |
          set -euo pipefail
          python3 scripts/autofix.py scorecard
