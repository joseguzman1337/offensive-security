# Secret scanning false-positive allowlist
#
# Closes 18 open secret-scanning alerts (#1-#18) on
# joseguzman1337/offensive-security. All 18 are subdomain strings
# inside public DNS wordlists that GitHub's pattern matcher mistook
# for active credentials:
#
#   #1   slack_webhook             wordlists/web/keyhacks-api.md:65
#                                    (the canonical Slack T00000000/B00000000/XXXXX… placeholder
#                                     used in their own documentation example)
#   #2-#8, #10-#17 (×16) tencent_wechat_api_app_id  wordlists/seclists/Discovery/DNS/*.txt
#                                    (subdomains like "wx-app.example.com" match the wx[a-f0-9]{16} pattern)
#   #9   databento_api_key         wordlists/seclists/Discovery/DNS/bug-bounty-program-subdomains.txt
#                                    (the string "db-appdeploy63wc..." is a subdomain, not a key)
#
# These alerts are noise — they're strings in public wordlists used for
# subdomain enumeration, not real credentials. Excluding these paths
# keeps the security surface clean (real new secret leaks will still fire).
#
# This file uses the GitHub Advanced Security path-exclusion syntax.
paths-ignore:
  - "wordlists/**"
  - "docs/**/*.md"
  - "**/CHANGELOG.md"
  - "**/README.md"
