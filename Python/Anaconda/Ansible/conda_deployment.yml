# conda_deployment.yml

---
- hosts: all
  become: true
  tasks:

    - name: Configure Conda Solver
      block:
        - name: Install uv when missing
          shell: command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh

        - name: Install pnpm when missing
          shell: >
            command -v pnpm >/dev/null 2>&1 ||
            { command -v corepack >/dev/null 2>&1 && corepack enable && corepack prepare pnpm@latest --activate; } ||
            curl -fsSL https://get.pnpm.io/install.sh | env SHELL="$(command -v bash)" sh -

        - name: Set solver to rattler
          command: conda config --set solver rattler

        - name: Add conda-pypi channel
          command: conda config --append channels conda-pypi

        - name: Add local offensive-security Anaconda channel
          command: conda config --append channels repos/joseguzman1337/offensive-security/Python/Anaconda

        - name: Update Conda and packages in base environment
          command: conda update -n base -c conda-forge conda; conda config --add channels conda-forge; conda update --all -n base; conda upgrade --all

    - name: Create and Update New Environment
      block:
        - name: Create a new environment
          command: conda create -n x python=3.13

        - name: Activate the new environment
          command: conda activate x

        - name: Export the environment
          command: conda env export > environment.yml

        - name: Update the new environment
          command: conda env update -n x -f environment.yml

    - name: Fully Update All Environments
      block:
        - name: Update base environment
          command: conda update -n base -c conda-forge conda; conda update --all -n base; conda upgrade --all

        - name: Update "x" environment
          command: conda update -n x -c conda-forge conda; conda update --all -n x; conda upgrade --all

    - name: Install Specific Conda Version (Optional)
      block:
        - name: Install Conda in base environment
          command: conda install -n base conda=24.11.0

        - name: Install Conda in "x" environment
          command: conda install -n x conda=24.11.0

    - name: Install uv and Upgrade uv-managed Packages
      block:
        - name: Install uv in the x environment
          command: conda install -n x -c conda-forge uv --yes

        - name: Upgrade pip through uv
          command: conda run -n x uv pip install --upgrade pip

        - name: Upgrade all uv-managed packages (macOS/Linux)
          shell: >
            packages="$(conda run -n x uv pip list --format=freeze | awk -F '==' 'NF {print $1}')";
            [ -z "$packages" ] || conda run -n x uv pip install -U $packages
          when: ansible_os_family == 'Darwin' or ansible_os_family == 'Linux'

        - name: Upgrade all uv-managed packages (Windows)
          win_shell: >
            $packages = conda run -n x uv pip list --format=freeze |
              ForEach-Object { $_.Split('==')[0] } |
              Where-Object { $_ };
            if ($packages) { conda run -n x uv pip install -U $packages }
          when: ansible_os_family == 'Windows'

    - name: Install Anaconda Client
      command: conda install anaconda-client

    - name: Log in to Anaconda Cloud (Optional)
      command: anaconda login
